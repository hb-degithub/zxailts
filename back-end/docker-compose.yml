version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: chatroom_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-zydylts}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../1.sql:/docker-entrypoint-initdb.d/1.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chatroom_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root123}
      DB_NAME: ${DB_NAME:-zydylts}
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  db_data: